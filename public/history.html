<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Review previous Student Study Helper sessions."
    />
    <title>Student Study Helper | History</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <span class="brand-icon">S</span>Student Study Helper
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open navigation"
          aria-expanded="false"
        >
          Menu
        </button>

        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="study.html">Study</a>
          <a href="history.html">History</a>
          <a href="about.html">About</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="container page-heading heading-row">
        <div>
          <span class="eyebrow">Saved study library</span>
          <h1>Previous Study Sessions</h1>
          <p>Return to saved topics and continue your revision.</p>
        </div>

        <a href="study.html" class="button button-primary">+ New Session</a>
      </section>

      <section class="container">
        <p id="historyMessage">Loading saved study sessions...</p>
        <div id="historyList" class="history-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <a class="brand footer-brand" href="index.html">
          <span class="brand-icon">S</span>Student Study Helper
        </a>
        <p>Saved sessions are loaded from Azure Blob Storage.</p>
      </div>
    </footer>
  </body>
</html>
